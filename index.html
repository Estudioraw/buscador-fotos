<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscador de Fotos — Studio Raw</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: white; font-family: 'Arial', sans-serif; }
    header { background: #1a1a1a; padding: 20px; text-align: center; border-bottom: 2px solid #e63946; }
    header h1 { font-size: 2rem; color: #e63946; }
    header p { color: #aaa; margin-top: 5px; }
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
    .card h2 { margin-bottom: 15px; font-size: 1.2rem; color: #e63946; }
    input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 1rem; margin-bottom: 10px; }
    input[type="file"] { display: none; }
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 1rem; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-red { background: #e63946; color: white; }
    .btn-red:hover { background: #c1121f; }
    .btn-green { background: #2a9d8f; color: white; }
    .btn-green:hover { background: #21867a; }
    .btn-gray { background: #333; color: white; margin-bottom: 10px; }
    .btn-gray:hover { background: #444; }
    .divider { text-align: center; color: #555; margin: 10px 0; }
    #preview-selfie { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: none; margin: 10px auto; border: 3px solid #2a9d8f; }
    #resultados { margin-top: 30px; }
    #resultados h2 { margin-bottom: 15px; color: #e63946; }
    .grid-fotos { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .foto-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; }
    .foto-card img { width: 100%; height: 180px; object-fit: cover; }
    .foto-card p { padding: 8px; font-size: 0.8rem; color: #aaa; text-align: center; }
    .loading { text-align: center; padding: 40px; color: #aaa; display: none; }
    .spinner { border: 3px solid #333; border-top: 3px solid #e63946; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sin-resultados { text-align: center; padding: 40px; color: #aaa; }
    .evento-select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: white; font-size: 1rem; margin-bottom: 10px; }
  </style>
</head>
<body>

<header>
  <h1>📸 Studio Raw</h1>
  <p>Encontrá tus fotos del evento</p>
</header>

<div class="container">

  <div class="card">
    <h2>🏁 Seleccioná el evento</h2>
    <select class="evento-select" id="evento-select">
      <option value="">Cargando eventos...</option>
    </select>
  </div>

  <div class="card">
    <h2>🔢 Buscar por número de dorsal</h2>
    <input type="text" id="input-dorsal" placeholder="Ingresá tu número de dorsal (ej: 123)" />
    <button class="btn btn-red" onclick="buscarPorDorsal()">Buscar mis fotos</button>
  </div>

  <div class="divider">— o —</div>

  <div class="card">
    <h2>🤳 Buscar por selfie</h2>
    <img id="preview-selfie" src="" alt="preview" />
    <label for="input-selfie">
      <button class="btn btn-gray" onclick="document.getElementById('input-selfie').click()">📷 Subir mi selfie</button>
    </label>
    <input type="file" id="input-selfie" accept="image/*" onchange="previewSelfie(this)" />
    <button class="btn btn-green" onclick="buscarPorSelfie()">Buscar por mi cara</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Buscando tus fotos...</p>
  </div>

  <div id="resultados"></div>

</div>

<script>
  const SUPABASE_URL = 'https://aiijwyddfjrlwrgpceou.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpaWp3eWRkZmpybHdyZ3BjZW91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTU0MTksImV4cCI6MjA5NTQ5MTQxOX0.FK9Mrztc9FuPbzEqg3qWSInhD4F1M9kh6wpNNrp--BM';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  async function cargarEventos() {
    const { data, error } = await db.from('fotos').select('evento');
    if (error) { console.error(error); return; }
    const eventos = [...new Set(data.map(f => f.evento).filter(Boolean))];
    const select = document.getElementById('evento-select');
    if (eventos.length === 0) {
      select.innerHTML = '<option value="">Sin eventos cargados aún</option>';
    } else {
      select.innerHTML = '<option value="">Seleccioná un evento</option>' +
        eventos.map(e => `<option value="${e}">${e}</option>`).join('');
    }
  }

  function previewSelfie(input) {
    const file = input.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.getElementById('preview-selfie');
        img.src = e.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  }

  async function buscarPorDorsal() {
    const dorsal = document.getElementById('input-dorsal').value.trim();
    const evento = document.getElementById('evento-select').value;
    if (!dorsal) { alert('Ingresá tu número de dorsal'); return; }

    mostrarLoading(true);
    let query = db.from('fotos').select('*').ilike('dorsales', `%${dorsal}%`);
    if (evento) query = query.eq('evento', evento);
    const { data, error } = await query;
    if (error) { console.error(error); }
    mostrarResultados(data);
  }

  async function buscarPorSelfie() {
    alert('La búsqueda por selfie estará disponible próximamente. Por ahora usá el número de dorsal.');
  }

  function mostrarLoading(show) {
    document.getElementById('loading').style.display = show ? 'block' : 'none';
    document.getElementById('resultados').innerHTML = '';
  }

  function mostrarResultados(fotos) {
    mostrarLoading(false);
    const div = document.getElementById('resultados');
    if (!fotos || fotos.length === 0) {
      div.innerHTML = '<div class="sin-resultados">😕 No encontramos fotos con ese dorsal.<br>Verificá el número e intentá de nuevo.</div>';
      return;
    }
    div.innerHTML = `<h2>📸 ${fotos.length} foto${fotos.length > 1 ? 's' : ''} encontrada${fotos.length > 1 ? 's' : ''}</h2>
      <div class="grid-fotos">${fotos.map(f => `
        <div class="foto-card">
          <img src="${f.ruta_drive}" alt="${f.nombre_archivo}" onerror="this.src='https://placehold.co/200x180?text=Preview+no+disponible'" />
          <p>${f.nombre_archivo}</p>
        </div>`).join('')}
      </div>`;
  }

  cargarEventos();
</script>

</body>
</html>
